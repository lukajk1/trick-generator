<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Skate Trick Generator</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Random Skate Trick Generator</h1>
<p>Flat ground only. Hit the button to get a trick. | <a href="skate.html">Play Game of SKATE →</a> | <a href="difficulty.html">Difficulty map →</a></p>

<div id="stance-control">
  <strong>Stances:</strong>
  <div id="stance-toggles">
    <label class="stance-label"><input type="checkbox" id="toggle-regular" checked> Regular</label>
    <label class="stance-label"><input type="checkbox" id="toggle-fakie" checked> Fakie</label>
    <label class="stance-label"><input type="checkbox" id="toggle-switch" checked> Switch</label>
    <label class="stance-label"><input type="checkbox" id="toggle-nollie" checked> Nollie</label>
  </div>
</div>

<div id="range-control">
  <strong>Difficulty range:</strong> <span id="range-display"></span>
  <div id="range-track">
    <div id="range-fill"></div>
    <input type="range" id="slider-min" min="1" max="4" value="1" step="1">
    <input type="range" id="slider-max" min="1" max="4" value="2" step="1">
  </div>
  <div id="range-labels">
    <span>Easy</span><span>Medium</span><span>Hard</span><span>Very Hard</span>
  </div>
</div>

<div id="result">—</div>
<button id="generate" onclick="generate()">Generate Random Trick</button>

<script src="js/tricks.js"></script>
<script src="js/main.js"></script>
<p><a href="https://github.com/lukajk1/trick-generator">GitHub</a></p>
</body>
</html>
